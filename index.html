<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vacation Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1 id="trip-title">載入中...</h1>
            <div id="trip-date">Vacation Mode: ON</div>
        </header>

        <div id="content-wrapper">
            <div id="content"></div>
        </div>

        <nav class="tab-bar">
            <button onclick="changePage('home')">首頁 🏖️</button>
            <button onclick="changePage('notes')">準備 🚩</button>
            <button onclick="changePage('schedule')">行程 🗺️</button>
            <button onclick="changePage('gifts')">伴手 🛍️</button>
            <button onclick="changePage('expenses')">花費 💰</button>
        </nav>
    </div>

    <script>
        let db = {};
        let currentDayIdx = 0;
        let checkedItems = JSON.parse(localStorage.getItem('trip_checked')) || {};

        async function init() {
            // 強制更新
            const res = await fetch('data.json?t=' + new Date().getTime());
            db = await res.json();
            document.getElementById('trip-title').innerText = db.trip_name;
            changePage('home');
        }

        // 計算距離出發還有幾天
        function getCountdown(startDate) {
            const now = new Date();
            const start = new Date(startDate);
            const diff = start - now;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            return days;
        }

        function toggleCheck(id) {
            checkedItems[id] = !checkedItems[id];
            localStorage.setItem('trip_checked', JSON.stringify(checkedItems));
            const el = document.getElementById(id);
            if (el) el.classList.toggle('done', checkedItems[id]);
        }

        async function fetchWeather(location, date) {
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}&limit=1`);
                const geoData = await geoRes.json();
                if (!geoData.length) return "📍 地點格式不符";
                const { lat, lon } = geoData[0];
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&start_date=${date}&end_date=${date}`);
                const wData = await wRes.json();
                const code = wData.daily.weathercode[0];
                const max = Math.round(wData.daily.temperature_2m_max[0]);
                const min = Math.round(wData.daily.temperature_2m_min[0]);
                // 優化天氣圖示
                const desc = {0:"☀️ 晴", 1:"🌤️ 多雲", 2:"⛅ 多雲", 3:"☁️ 陰", 45:"🌫️ 霧", 61:"🌧️ 雨", 63:"雨"}[code] || "🌤️ 多雲";
                return `📍 ${location}：${min}°C ~ ${max}°C ${desc}`;
            } catch (e) { return "暫無天氣資訊"; }
        }

        async function renderSchedule() {
            const container = document.getElementById('content');
            const dayData = db.schedule[currentDayIdx];
            
            // 按鈕顯示：Day X + 日期 (月/日)
            let tabs = `<div class="day-tabs">` + db.schedule.map((d, i) => {
                const dateObj = new Date(d.date);
                const dateStr = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                return `<button class="${i===currentDayIdx?'active':''}" onclick="currentDayIdx=${i};renderSchedule();">
                            Day ${d.day}<br><span class="tab-date">${dateStr}</span>
                        </button>`;
            }).join('') + `</div>`;

            container.innerHTML = `<h2 class="page-title">🗺️ 詳細行程</h2>${tabs}<div id="weather-box" class="weather-box">正在同步天氣...</div><div id="schedule-list"></div>`;
            
            fetchWeather(dayData.location, dayData.date).then(info => {
                document.getElementById('weather-box').innerText = info;
            });

            document.getElementById('schedule-list').innerHTML = dayData.items.map(item => `
                <div class="schedule-item">
                    <div class="time-tag">${item.time}</div>
                    <div class="schedule-info">
                        <div class="schedule-title">${item.content}</div>
                        ${item.memo ? `<div class="schedule-memo">${item.memo}</div>` : ''}
                        ${item.link ? `<a href="${item.link}" target="_blank" class="map-link">📍 查看地圖</a>` : ''}
                    </div>
                </div>`).join('');
        }

        function renderListPage(page) {
            const container = document.getElementById('content');
            const list = page === 'notes' ? db.notes : db.gifts;
            const title = page === 'notes' ? '🚩 準備清單' : '🛍️ 伴手禮必買';
            container.innerHTML = `<h2 class="page-title">${title}</h2>` + 
                list.map((item, i) => {
                    const id = `${page}-${i}`;
                    return `<div class="list-item ${checkedItems[id]?'done':''}" id="${id}" onclick="toggleCheck('${id}')">${item}</div>`;
                }).join('');
        }

        function changePage(page) {
            const container = document.getElementById('content');
            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');

            if(page === 'schedule') renderSchedule();
            else if(page === 'notes' || page === 'gifts') renderListPage(page);
            else if(page === 'home') {
                const dateRange = db.date || "";
                const daysToGo = dateRange ? getCountdown(dateRange.split(' ~ ')[0]) : "?";
                const countdownText = daysToGo > 0 ? `距離出發還有 ${daysToGo} 天` : (daysToGo === 0 ? "今天出發！✈️" : "Enjoy Your Trip! 👋");

                container.innerHTML = `
                    <div class="card home-card">
                        <div class="icon">🌴</div>
                        <h2>${db.destination}</h2>
                        <div class="countdown">${countdownText}</div>
                        <p class="home-date">${dateRange}</p>
                    </div>`;
            }
            else if(page === 'expenses') {
                let total = 0;
                container.innerHTML = `<h2 class="page-title">💰 花費預算</h2>` + db.expenses.map((e, i) => {
                    const id = `exp-${i}`;
                    total += parseInt(e.cost);
                    return `<div class="list-item expense-item ${checkedItems[id]?'done':''}" id="${id}" onclick="toggleCheck('${id}')">
                                <span>${e.item}</span><span class="cost">$${e.cost}</span>
                            </div>`;
                }).join('') + `<div class="total-box">總計：<span class="total-amount">$${total}</span></div>`;
            }
            document.getElementById('content-wrapper').scrollTo(0, 0);
        }

        init();
    </script>
</body>
</html>
