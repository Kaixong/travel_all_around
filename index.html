<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊手冊 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1 id="trip-title">載入中...</h1>
            <div id="sub-header"></div>
        </header>

        <div id="content-wrapper">
            <div id="content" class="fade-in">
                </div>
        </div>

        <nav class="tab-bar">
            <button onclick="changePage('home')">首頁</button>
            <button onclick="changePage('notes')">注意</button>
            <button onclick="changePage('schedule')">行程</button>
            <button onclick="changePage('gifts')">必買</button>
            <button onclick="changePage('expenses')">明細</button>
        </nav>
    </div>

    <script>
        let db = {};
        let checkedItems = JSON.parse(localStorage.getItem('trip_checked')) || {};

        async function init() {
            // 加上 ?t=時間戳記，強制繞過 GitHub Pages 的快取
            const res = await fetch('data.json?t=' + new Date().getTime());
            db = await res.json();
            document.getElementById('trip-title').innerText = db.trip_name;
            document.getElementById('trip-date').innerText = db.date || "";
            changePage('home');
        }

        function toggleCheck(id) {
            checkedItems[id] = !checkedItems[id];
            localStorage.setItem('trip_checked', JSON.stringify(checkedItems));
            const el = document.getElementById(id);
            if (checkedItems[id]) el.classList.add('done');
            else el.classList.remove('done');
        }

        function changePage(page) {
            const container = document.getElementById('content');
            const subHeader = document.getElementById('sub-header');
            
            // 觸發切換動畫
            container.classList.remove('fade-in');
            void container.offsetWidth; // 強制重繪
            container.classList.add('fade-in');

            let html = "";
            subHeader.innerHTML = ""; // 清空副標題

            if(page === 'home') {
                html = `<div class="card"><h2>${db.destination}</h2><p>日期：${db.date}</p><p>準備好出發了嗎？</p></div>`;
            } 
            else if(page === 'notes' || page === 'gifts') {
                const list = page === 'notes' ? db.notes : db.gifts;
                html = `<h2>${page==='notes'?'注意事項':'必買清單'}</h2>`;
                html += list.map((item, i) => {
                    const id = `${page}-${i}`;
                    const isDone = checkedItems[id] ? 'done' : '';
                    return `<div class="list-item ${isDone}" id="${id}" onclick="toggleCheck('${id}')">${item}</div>`;
                }).join('');
            } 
            else if(page === 'schedule') {
                html = `<h2>詳細行程</h2>`;
                db.schedule.forEach(dayGroup => {
                    html += `<div class="day-section">
                                <div class="day-header">Day ${dayGroup.day}</div>`;
                    
                    dayGroup.items.forEach(item => {
                        html += `
                            <div class="schedule-item">
                                <div class="time-tag">${item.time}</div>
                                <div class="schedule-info">
                                    <div class="schedule-title">${item.content}</div>
                                    ${item.memo ? `<div class="schedule-memo">${item.memo}</div>` : ''}
                                    ${item.link ? `<a href="${item.link}" target="_blank" class="map-link">📍 查看地圖</a>` : ''}
                                </div>
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                });
            }
            else if(page === 'expenses') {
                let total = 0;
                html = `<h2>開銷明細</h2>`;
                html += db.expenses.map((e, i) => {
                    const id = `exp-${i}`;
                    const isDone = checkedItems[id] ? 'done' : '';
                    total += parseInt(e.cost);
                    return `<div class="list-item ${isDone}" id="${id}" onclick="toggleCheck('${id}')">
                                <span>${e.item}</span><span>$${e.cost}</span>
                            </div>`;
                }).join('');
                html += `<div class="total">總計：$${total}</div>`;
            }
            
            container.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
